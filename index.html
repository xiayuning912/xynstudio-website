<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏亚宁 · 个人官网 | 科技与浪漫并存</title>
    <meta name="description" content="夏亚宁的个人官方网站，展示骑行、摄影、徒步的热爱，以及技术履历与创意作品。">
    <meta name="keywords" content="夏亚宁,个人网站,作品集,骑行,摄影,徒步,前端开发,UI设计">
    <meta name="author" content="夏亚宁">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 首页特有样式 */
        .hero {
            text-align: center;
            padding: 4rem 2rem 3.5rem;
            margin-bottom: 3rem;
        }
        .hero .avatar {
            width: 96px;
            height: 96px;
            background: var(--surface-2, #f2f2f0);
            border: 1px solid var(--border, #e8e8e5);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text, #111);
            margin-bottom: 1.75rem;
        }
        .hero h1 {
            font-size: 2.8rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.6rem;
        }
        .hero .tagline {
            font-size: 1rem;
            color: var(--text-3, #999);
            min-height: 1.5em;
        }
        .hero .sub-line {
            margin-top: 1rem;
            font-size: 0.88rem;
            color: var(--text-3, #999);
            letter-spacing: 0.03em;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }
        .feature-card {
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .feature-card .icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--surface-2, #f2f2f0);
            border: 1px solid var(--border, #e8e8e5);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--text-2, #555);
            margin-bottom: 1.25rem;
        }
        .feature-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.6rem;
        }
        .feature-card p {
            color: var(--text-3, #999);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .feature-card .btn {
            margin-top: 1.5rem;
        }
        .cta {
            text-align: center;
            margin: 2.5rem 0;
        }
        @media (max-width: 600px) {
            .hero { padding: 2.5rem 1rem 2rem; }
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo">Xyn Studio</div>
        <button class="hamburger" aria-label="菜单" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html" class="active">首页</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="hobbies.html">爱好</a></li>
            <li><a href="resume.html">简历</a></li>
            <li><a href="contact.html">联系</a></li>
        </ul>
    </nav>

    <div class="hero glass-card scroll-reveal">
        <div class="avatar">夏</div>
        <h1 class="page-title">夏亚宁</h1>
        <div class="tagline"><span id="typewriter">创意开发者 · 光影追逐者 · 山海收藏家</span></div>
        <div class="sub-line">用代码构建浪漫 · 用镜头记录世界</div>
    </div>

    <div class="features-grid">
        <div class="feature-card glass-card scroll-reveal">
            <div class="icon-wrap"><i class="fas fa-bicycle"></i></div>
            <h3>骑行</h3>
            <p>风与自由，探索城市边界与山川湖海。</p>
            <a href="hobbies.html#cycling" class="btn">了解更多</a>
        </div>
        <div class="feature-card glass-card scroll-reveal" style="transition-delay: 0.1s;">
            <div class="icon-wrap"><i class="fas fa-camera"></i></div>
            <h3>摄影</h3>
            <p>捕捉瞬间的感动，用光影讲故事。</p>
            <a href="hobbies.html#photography" class="btn">了解更多</a>
        </div>
        <div class="feature-card glass-card scroll-reveal" style="transition-delay: 0.2s;">
            <div class="icon-wrap"><i class="fas fa-hiking"></i></div>
            <h3>徒步</h3>
            <p>一步步接近自然，也靠近自己。</p>
            <a href="hobbies.html#hiking" class="btn">了解更多</a>
        </div>
    </div>

    <div class="cta">
        <a href="about.html" class="btn">关于我 <i class="fas fa-arrow-right"></i></a>
    </div>

    <footer>
        <p>© 2025 夏亚宁 | 保持热爱，奔赴山海</p>
    </footer>
</div>
<a id="back-to-top" class="back-to-top" aria-label="回到顶部"><i class="fas fa-chevron-up"></i></a>
<script src="main.js"></script>
</body>
</html>
