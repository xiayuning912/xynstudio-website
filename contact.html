<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系夏亚宁 | 期待与你交流</title>
    <meta name="description" content="通过邮箱或社交媒体联系夏亚宁，探讨合作、技术或分享故事。">
    <meta name="keywords" content="联系夏亚宁,邮箱,社交媒体,合作">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .contact-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 2rem 0;
        }
        .contact-info, .contact-form {
            flex: 1;
            min-width: 280px;
            padding: 2.5rem;
        }
        .contact-info h2, .contact-form h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 1.25rem;
        }
        .contact-info h2 i, .contact-form h2 i {
            margin-right: 0.5rem;
            font-size: 0.9rem;
        }
        .contact-info p {
            font-size: 0.9rem;
            color: var(--text-2);
            margin-bottom: 0.5rem;
            line-height: 1.7;
        }
        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2, #f2f2f0);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            font-size: 1rem;
            text-decoration: none;
            transition: color 0.2s, border-color 0.2s, transform 0.2s;
        }
        .social-links a:hover {
            color: var(--text);
            border-color: var(--text);
            transform: translateY(-2px);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-3);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: var(--bg, #f7f7f5);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--silver);
        }
        textarea { resize: vertical; }
        .form-note {
            font-size: 0.78rem;
            color: var(--text-3);
            margin-top: 0.75rem;
        }
        @media (max-width: 768px) {
            .contact-flex { flex-direction: column; }
            .contact-info, .contact-form { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>
<div class="container">
    <nav class="navbar">
        <div class="logo">Xyn Studio</div>
        <button class="hamburger" aria-label="菜单" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="hobbies.html">爱好</a></li>
            <li><a href="resume.html">简历</a></li>
            <li><a href="contact.html" class="active">联系</a></li>
        </ul>
    </nav>

    <h1 class="page-title">联系我</h1>
    <div class="section-subtitle">期待与你交流</div>
    <div class="contact-flex">
        <div class="glass-card contact-info scroll-reveal">
            <h2><i class="fas fa-envelope"></i> 保持连接</h2>
            <p>如果你有项目合作、技术交流，或者只是想聊聊骑行与摄影，都欢迎联系我。</p>
            <p><strong>邮箱：</strong> xiayuning@work.com</p>
            <p><strong>地址：</strong> 中国 · 杭州</p>
            <div class="social-links">
                <a href="https://github.com/xiayuning912" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>

        <div class="glass-card contact-form scroll-reveal">
            <h2><i class="fas fa-paper-plane"></i> 发送消息</h2>
            <form action="https://formspree.io/f/your-endpoint" method="POST">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" placeholder="你的姓名" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">留言</label>
                    <textarea id="message" name="message" rows="4" placeholder="写下你的想法..."></textarea>
                </div>
                <button type="submit" class="btn">发送 <i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="form-note">* 表单使用 Formspree 服务，提交后我会尽快回复。</p>
        </div>
    </div>

    <footer>
        <p>© 2025 夏亚宁 | 期待与你相遇</p>
    </footer>
</div>
<a id="back-to-top" class="back-to-top" aria-label="回到顶部"><i class="fas fa-chevron-up"></i></a>
<script src="main.js"></script>
</body>
</html>
